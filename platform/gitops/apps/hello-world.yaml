# hello-world workload — ArgoCD syncs the rendered manifests from git into the
# hello-world namespace. This is the app-delivery half of the platform (kept
# separate from platform addons). Dev edits score.yaml -> make render -> commit
# -> ArgoCD deploys. No kubectl apply by hand.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-world
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/xebia/platform-engineering-demo-01.git
    targetRevision: HEAD
    path: workloads/hello-world/dist/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: hello-world
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
