# App-of-Apps for workloads: watches platform/gitops/apps/ and creates one
# child Application per workload (hello-world, and future apps). Parallel to
# addons.yaml, which bootstraps platform addons.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workloads
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/xebia/platform-engineering-demo-01.git
    targetRevision: HEAD
    path: platform/gitops/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
