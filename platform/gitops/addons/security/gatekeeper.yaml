# OPA/Gatekeeper — policy guardrails for the platform.
# Child Application of the `platform-addons` App-of-Apps. ArgoCD installs the
# upstream Gatekeeper Helm chart into the gatekeeper-system namespace.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://open-policy-agent.github.io/gatekeeper/charts
    chart: gatekeeper
    targetRevision: 3.22.2
    helm:
      releaseName: gatekeeper
  destination:
    server: https://kubernetes.default.svc
    namespace: gatekeeper-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # Gatekeeper CRDs are large; avoids the
                               # last-applied-configuration annotation limit
